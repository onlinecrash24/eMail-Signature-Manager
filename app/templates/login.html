{% extends "base.html" %}

{% block title %}Anmelden - Signatur Manager{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-sm-10 col-md-6 col-lg-4">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="E-Mail Signatur Manager" class="img-fluid mb-3" style="max-height: 120px;">
                    <p class="text-muted">Bitte melden Sie sich an</p>
                </div>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user"></i> Benutzername
                        </label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" required autofocus placeholder="Benutzername eingeben">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> Passwort
                        </label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" required placeholder="Passwort eingeben">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> Anmelden
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
