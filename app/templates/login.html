{% extends "base.html" %}

{% block title %}{{ t('login.title') }} - {{ t('app.name') }}{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-sm-10 col-md-6 col-lg-4">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="{{ t('app.name') }}" class="img-fluid mb-3" style="max-height: 120px;">
                    <p class="text-muted">{{ t('login.prompt') }}</p>
                </div>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user"></i> {{ t('login.username') }}
                        </label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" required autofocus placeholder="{{ t('login.username_ph') }}">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> {{ t('login.password') }}
                        </label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" required placeholder="{{ t('login.password_ph') }}">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> {{ t('login.submit') }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
