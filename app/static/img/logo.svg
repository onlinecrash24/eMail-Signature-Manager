<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <!-- Envelope body -->
  <rect x="8" y="28" width="72" height="52" rx="4" ry="4" fill="none" stroke="#2E86DE" stroke-width="4"/>
  <!-- Envelope flap -->
  <polyline points="8,28 44,58 80,28" fill="none" stroke="#2E86DE" stroke-width="4" stroke-linejoin="round"/>
  <!-- Pen body (diagonal) -->
  <line x1="52" y1="12" x2="78" y2="48" stroke="#2E86DE" stroke-width="4" stroke-linecap="round"/>
  <!-- Pen tip -->
  <line x1="78" y1="48" x2="82" y2="56" stroke="#2E86DE" stroke-width="3" stroke-linecap="round"/>
  <!-- Pen top decoration -->
  <line x1="48" y1="6" x2="52" y2="12" stroke="#2E86DE" stroke-width="3" stroke-linecap="round"/>
  <!-- Signature scribble -->
  <path d="M30,68 C34,60 40,60 42,66 C44,72 48,64 54,62 C58,60 60,66 64,64" fill="none" stroke="#2E86DE" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Text -->
  <text x="96" y="38" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#2C3E50">eMail</text>
  <text x="96" y="62" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#2C3E50">Signature</text>
  <text x="96" y="86" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#2C3E50">Manager</text>
</svg>
